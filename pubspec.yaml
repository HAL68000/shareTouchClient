name: share_touch_client
description: Native mobile client for ShareTouch (QR scan + remote control).
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  mobile_scanner: ^5.2.3
  socket_io_client: ^3.1.1
  flutter_webrtc: ^0.12.10
  shared_preferences: ^2.3.3
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
